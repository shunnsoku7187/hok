name: Build and Deploy HTML

on:
  push:
    branches:
      - main  # mainブランチに変更が加わると実行
      - 'codex/**'
  pull_request:
    branches:
      - main  # mainブランチへのプルリクエストが作成されたときにも実行
  repository_dispatch:
    types: [trigger-from-discord]
  schedule:
    - cron: '0 21 * * 6'

jobs:
  build:
    runs-on: ubuntu-latest  # Ubuntu環境で実行
    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # リポジトリのコードをチェックアウト

      - name: Set up Python
        uses: actions/setup-python@v2  # Python環境をセットアップ
        with:
          python-version: '3.x'  # 使用するPythonのバージョン

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Japanese Fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-ipaexfont

      - name: Get html to txt
        run: |
          python get_html.py

      - name: Sync new heroes
        run: |
          python sync_new_heroes.py

      - name: Upload new icon preview
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: new-hero-icons
          path: |
            list_html/hok_pics/florentino.png
            list_html/hok_pics/lorion.png
            list_html/hok_pics/haya.png
            list_html/hok_pics/annette.png
            list_html/hok_pics/devara.png
            list_html/hok_pics/chicha.png
            list_html/hok_pics/yango.png
            list_html/hok_pics/lapulapu.png

      - name: Run the script
        run: |
          python main.py

      - name: Commit generated files
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Generated HTML"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/shunnsoku7187/hok.git
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload files to FTP server
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.2
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: list_html/
          server-dir: /public_html/
